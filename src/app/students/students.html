<div class="flex flex-col gap-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-[#171923]">Students</h1>
      <p class="mt-1 text-sm text-[#6B7280]">Manage student records for your class.</p>
    </div>
    <button mat-raised-button color="primary" (click)="openAddStudentDialog()">
      Add Student
    </button>
  </div>

  <div class="overflow-hidden rounded-xl border border-[#E5E7EB] bg-white">
    <app-data-table
      [data]="students()"
      [columns]="columns"
      (editClicked)="editStudent($event)"
      (deleteClicked)="deleteStudent($event)">
    </app-data-table>
  </div>

</div>
