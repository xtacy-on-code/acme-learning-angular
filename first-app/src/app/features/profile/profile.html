<div class="flex flex-col gap-6">

  <div>
    <h1 class="text-2xl font-bold tracking-tight text-text">My Profile</h1>
    <p class="mt-1 text-sm text-muted">View and update your personal details.</p>
  </div>

  <div class="rounded-xl border border-border bg-surface p-6 shadow-card">

    <!-- Avatar + upload -->
    <div class="flex items-center gap-5 border-b border-border pb-6">
      <div class="relative">
        @if (avatarUrl()) {
          <img [src]="avatarUrl()" alt="Profile photo"
               class="h-20 w-20 rounded-full object-cover ring-2 ring-border">
        } @else {
          <div class="flex h-20 w-20 items-center justify-center rounded-full bg-primary text-2xl font-semibold text-on-primary">
            {{ initial() }}
          </div>
        }
      </div>

      <div class="flex flex-col gap-2">
        <!-- The button just clicks the hidden native file input. -->
        <button type="button" (click)="fileInput.click()" [disabled]="store.uploading()"
                class="w-fit rounded-lg border border-border px-4 py-2 text-sm font-medium text-text transition-colors hover:border-primary hover:text-primary disabled:opacity-50">
          {{ store.uploading() ? 'Uploading…' : 'Change photo' }}
        </button>
        <p class="text-xs text-muted">JPG or PNG, up to 2 MB.</p>
        <input #fileInput type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)">
      </div>
    </div>

    <!-- Editable details -->
    <form [formGroup]="profileForm" (ngSubmit)="handleSubmit()" class="pt-6">
      <div class="grid grid-cols-2 gap-x-4">
        <mat-form-field appearance="outline">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Phone</mat-label>
          <input matInput type="tel" formControlName="phone">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Date of Birth</mat-label>
          <input matInput [matDatepicker]="picker" formControlName="dob">
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="col-span-2">
          <mat-label>Address</mat-label>
          <textarea matInput formControlName="address" rows="2"></textarea>
        </mat-form-field>

        <mat-form-field appearance="outline" class="col-span-2">
          <mat-label>Bio</mat-label>
          <textarea matInput formControlName="bio" rows="3"></textarea>
        </mat-form-field>
      </div>

      <div class="flex justify-end">
        <button mat-flat-button color="primary" type="submit"
                [disabled]="profileForm.invalid || store.saving()">
          {{ store.saving() ? 'Saving…' : 'Save changes' }}
        </button>
      </div>
    </form>

  </div>

</div>
