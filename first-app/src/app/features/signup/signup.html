<div class="flex h-screen items-center justify-center bg-background">
  <div class="w-full max-w-sm rounded-xl border border-border bg-surface p-8 shadow-card">
    <div class="mb-8">
      <span class="text-lg font-semibold text-text">Acme<span class="text-primary">.</span></span>
      <h2 class="mt-4 text-xl font-semibold text-text">Create your account</h2>
      <p class="mt-1 text-sm text-muted">Start by filling in your details.</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="handleSubmit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-text">Name</label>
        <input formControlName="name" type="text" placeholder="Your name"
               class="rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text outline-none transition-colors focus:border-primary focus:ring-1 focus:ring-primary">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-text">Email</label>
        <input formControlName="email" type="email" placeholder="you@example.com"
               class="rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text outline-none transition-colors focus:border-primary focus:ring-1 focus:ring-primary">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-text">Password</label>
        <input formControlName="password" type="password" placeholder="••••••••"
               class="rounded-lg border border-border bg-surface px-3 py-2 text-sm text-text outline-none transition-colors focus:border-primary focus:ring-1 focus:ring-primary">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-text">I am a</label>
        <mat-radio-group formControlName="role" class="flex gap-4">
          <mat-radio-button value="student">Student</mat-radio-button>
          <mat-radio-button value="professor">Professor</mat-radio-button>
        </mat-radio-group>
        @if (signupForm.get('role')?.invalid && signupForm.get('role')?.touched) {
          <span class="text-xs text-red-500">Please choose a role</span>
        }
      </div>

      <button type="submit"
              class="mt-2 rounded-lg bg-primary py-2.5 text-sm font-medium text-on-primary transition-colors hover:bg-primary-hover">
        Sign up
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-muted">
      Already have an account?
      <a routerLink="/login" class="font-medium text-primary hover:text-primary-hover">Log in</a>
    </p>
  </div>
</div>
