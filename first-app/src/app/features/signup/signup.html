<div class="relative flex min-h-screen items-center justify-center overflow-hidden bg-background p-8">
  <!-- Soft primary glow backdrop -->
  <div class="pointer-events-none absolute inset-0"
       style="background: radial-gradient(900px 500px at 80% -10%, color-mix(in srgb, var(--c-primary) 12%, transparent), transparent 70%);"></div>

  <div class="relative w-full max-w-sm">
    <!-- Brand mark -->
    <div class="mb-7 flex items-center gap-2.5">
      <div class="flex h-9 w-9 items-center justify-center rounded-[9px] bg-primary text-base font-bold text-on-primary">A</div>
      <span class="text-[17px] font-bold tracking-tight text-text">Acme Learning</span>
    </div>

    <div class="rounded-2xl border border-border bg-surface p-8 shadow-card">
      <h1 class="text-xl font-bold tracking-tight text-text">Create your account</h1>
      <p class="mt-1 text-sm text-muted">Start by filling in your details.</p>

      <form [formGroup]="signupForm" (ngSubmit)="handleSubmit()" class="mt-6 flex flex-col gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-text">Full name</label>
          <input formControlName="name" type="text" placeholder="Jane Cooper"
                 class="h-10 rounded-lg border border-border-strong bg-surface px-3 text-sm text-text outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-text">Email</label>
          <input formControlName="email" type="email" placeholder="you@acme.edu"
                 class="h-10 rounded-lg border border-border-strong bg-surface px-3 text-sm text-text outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20">
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-text">Password</label>
          <input formControlName="password" type="password" placeholder="••••••••"
                 class="h-10 rounded-lg border border-border-strong bg-surface px-3 text-sm text-text outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20">
        </div>

        <!-- Role picker (selectable cards bound to the 'role' control) -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold text-text">I am a</label>
          <div class="grid grid-cols-2 gap-2.5">
            @for (r of roleOptions; track r.value) {
              <button type="button" (click)="selectRole(r.value)"
                      class="flex flex-col items-start gap-0.5 rounded-lg border px-3 py-2.5 text-left transition-all"
                      [class]="signupForm.get('role')?.value === r.value
                        ? 'border-primary bg-primary/5 ring-1 ring-primary'
                        : 'border-border-strong hover:border-primary/50'">
                <span class="text-sm font-semibold text-text">{{ r.label }}</span>
                <span class="text-xs text-muted">{{ r.hint }}</span>
              </button>
            }
          </div>
          @if (signupForm.get('role')?.invalid && signupForm.get('role')?.touched) {
            <span class="text-xs text-red-500">Please choose a role</span>
          }
        </div>

        <button type="submit"
                class="mt-2 h-[42px] rounded-lg bg-primary text-sm font-semibold text-on-primary transition-colors hover:bg-primary-hover">
          Sign up
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-muted">
        Already have an account?
        <a routerLink="/login" class="font-semibold text-primary hover:text-primary-hover">Log in</a>
      </p>
    </div>
  </div>
</div>
