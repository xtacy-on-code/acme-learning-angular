<div class="flex flex-col gap-8">

  <!-- Page heading -->
  <div>
    <h1 class="text-2xl font-bold tracking-tight text-text">Welcome back</h1>
    <p class="mt-1 text-sm text-muted">Here's a quick overview of your students.</p>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">

    <a routerLink="/students"
       class="group block rounded-xl border border-border bg-surface p-5 shadow-card transition-all duration-200 ease-out hover:-translate-y-0.5 hover:border-primary hover:shadow-md">
      <div class="flex items-center justify-between">
        <p class="text-xs font-semibold uppercase tracking-wide text-muted">Total Students</p>
        <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary/10 text-primary">
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
      </div>
      <p class="mt-3 text-3xl font-bold tracking-tight text-text">{{ totalStudents() }}</p>
      <p class="mt-2 inline-flex items-center gap-1 text-xs font-medium text-muted transition-colors group-hover:text-primary">
        View all students
        <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14"/><path d="M13 6l6 6-6 6"/>
        </svg>
      </p>
    </a>

    <div class="rounded-xl border border-border bg-surface p-5 shadow-card">
      <p class="text-xs font-semibold uppercase tracking-wide text-muted">Male</p>
      <p class="mt-3 text-3xl font-bold tracking-tight text-text">{{ maleCount() }}</p>
      <span class="mt-2 inline-flex items-center gap-1 rounded-full bg-surface-hover px-2 py-0.5 text-xs font-medium text-muted">
        {{ malePct() }}% of total
      </span>
    </div>

    <div class="rounded-xl border border-border bg-surface p-5 shadow-card">
      <p class="text-xs font-semibold uppercase tracking-wide text-muted">Female</p>
      <p class="mt-3 text-3xl font-bold tracking-tight text-text">{{ femaleCount() }}</p>
      <span class="mt-2 inline-flex items-center gap-1 rounded-full bg-surface-hover px-2 py-0.5 text-xs font-medium text-muted">
        {{ femalePct() }}% of total
      </span>
    </div>

    <div class="rounded-xl border border-border bg-surface p-5 shadow-card">
      <p class="text-xs font-semibold uppercase tracking-wide text-muted">Other</p>
      <p class="mt-3 text-3xl font-bold tracking-tight text-text">{{ otherCount() }}</p>
      <span class="mt-2 inline-flex items-center gap-1 rounded-full bg-surface-hover px-2 py-0.5 text-xs font-medium text-muted">
        {{ otherPct() }}% of total
      </span>
    </div>

  </div>

</div>
