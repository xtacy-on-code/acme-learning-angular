<div class="flex h-full min-h-0 flex-col gap-4">

  <!-- Search + Filters toolbar -->
  <div class="flex flex-wrap items-center gap-2">

    <!-- Search -->
    <div class="relative min-w-[240px] flex-1 max-w-sm">
      <svg
        class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-faint"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7" />
        <path d="m21 21-4.3-4.3" />
      </svg>
      <input
        type="text"
        placeholder="Search name, email, roll no…"
        [value]="studentStore.search()"
        (input)="onSearch($any($event.target).value)"
        class="filter-control h-9 w-full rounded-lg border border-border-strong bg-surface py-2 pl-9 pr-4 text-sm text-text outline-none focus:border-primary">
    </div>

    <!-- Grade -->
    <select
      [value]="studentStore.filters().grade"
      (change)="onFilterChange('grade', $any($event.target).value)"
      class="filter-control h-9 rounded-lg border border-border-strong bg-surface px-3 text-sm font-medium text-text outline-none focus:border-primary">
      <option value="">All grades</option>
      @for (g of grades; track g) {
        <option [value]="g">Grade {{ g }}</option>
      }
    </select>

    <!-- Gender chips -->
    <div class="flex items-center gap-1 rounded-lg border border-border-strong bg-surface p-0.5">
      @for (opt of genderChips; track opt.value) {
        <button
          type="button"
          (click)="onFilterChange('gender', opt.value)"
          class="rounded-md px-2.5 py-1 text-xs font-semibold transition-colors"
          [class]="studentStore.filters().gender === opt.value ? 'bg-primary/10 text-primary' : 'text-muted hover:text-text'">
          {{ opt.label }}
        </button>
      }
    </div>

    <button
      class="reset-btn flex h-9 items-center gap-1.5 rounded-lg border border-border-strong bg-surface px-3 text-sm font-medium text-muted hover:text-text"
      (click)="clearFilters()">
      ↺ Reset
    </button>

    <div class="flex-1"></div>

    @if (canManage()) {
      <button
        (click)="openAddStudentDialog()"
        class="flex h-9 items-center gap-1.5 rounded-lg bg-primary px-4 text-sm font-semibold text-on-primary transition-colors hover:bg-primary-hover">
        <span class="text-base leading-none">+</span> Add student
      </button>
    }
  </div>

  <!-- Bulk-action panel: slim bar that appears only while rows are selected.
       Lets you set the SAME grade/gender on every selected student at once (leave a
       field blank to keep it unchanged), or bulk-delete them. -->
  @if (canManage() && selectedStudents.length) {
    <div class="flex flex-wrap items-center gap-3 rounded-[14px] border border-primary/30 bg-primary/[0.07] px-4 py-2.5">
      <span class="text-sm font-medium text-text">
        {{ selectedStudents.length }} student{{ selectedStudents.length > 1 ? 's' : '' }} selected
      </span>

      <div class="h-5 w-px bg-border"></div>

      <span class="text-sm text-muted">Set</span>

      <select
        [(ngModel)]="bulkGrade"
        class="rounded-lg border border-border bg-surface px-3 py-1.5 text-sm text-text outline-none focus:border-primary">
        <option value="">Grade (no change)</option>
        @for (g of grades; track g) {
          <option [value]="g">Grade {{ g }}</option>
        }
      </select>

      <select
        [(ngModel)]="bulkGender"
        class="rounded-lg border border-border bg-surface px-3 py-1.5 text-sm text-text outline-none focus:border-primary">
        <option value="">Gender (no change)</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>

      <button
        mat-flat-button color="primary"
        [disabled]="applying"
        (click)="applyBulkEdit()">
        {{ applying ? 'Applying…' : 'Apply to ' + selectedStudents.length }}
      </button>

      <div class="ml-auto flex items-center gap-3">
        <button
          (click)="bulkDeleteSelected()"
          class="rounded-lg bg-red-600 px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-red-700">
          Delete selected
        </button>
        <button
          (click)="clearBulkEdit()"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-muted hover:text-text">
          Cancel
        </button>
      </div>
    </div>
  }

  <!-- Table -->
  <div class="flex flex-1 min-h-0 flex-col overflow-hidden rounded-[14px] border border-border bg-surface shadow-card">

    <div class="flex-1 overflow-auto">
      <app-data-table
        [data]="studentStore.students()"
        [columns]="columns"
        [loading]="studentStore.loading()"
        [sortBy]="studentStore.sortBy()"
        [sortOrder]="studentStore.sortOrder()"
        [showEdit]="canManage()"
        [showDelete]="canManage()"
        [selectable]="canManage()"
        [highlightIds]="highlightIds"
        (sortChanged)="onColumnSort($event)"
        (editClicked)="editStudent($event)"
        (deleteClicked)="deleteStudent($event)"
        (selectionChanged)="onSelectionChanged($event)">
      </app-data-table>
    </div>

    <div class="flex items-center justify-between border-t border-border px-4 py-2.5">
      <p class="text-sm text-muted">
        Showing
        <span class="font-semibold text-text">{{ studentStore.students().length }}</span>
        of
        <span class="font-semibold text-text">{{ studentStore.total() }}</span>
        students
      </p>

      <mat-paginator
        [length]="studentStore.total()"
        [pageSize]="studentStore.limit()"
        [pageIndex]="studentStore.page() - 1"
        [hidePageSize]="true"
        (page)="onPageChange($event)"
        class="!bg-transparent">
      </mat-paginator>
    </div>

  </div>

</div>
