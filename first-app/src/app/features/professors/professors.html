<div class="flex h-full min-h-0 flex-col gap-4">

  <!-- Toolbar -->
  <div class="flex flex-wrap items-center gap-3">
    @if (canManage()) {
      <span class="flex items-center gap-2 text-xs text-muted">
        <span class="inline-block h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
        Double-click a cell to edit inline
      </span>
    }
    <div class="flex-1"></div>
    <span class="text-sm text-faint">{{ professorStore.professors().length }} faculty</span>
    @if (canManage()) {
      <button
        (click)="openAddProfessorDialog()"
        class="flex h-9 items-center gap-1.5 rounded-lg bg-primary px-4 text-sm font-semibold text-on-primary transition-colors hover:bg-primary-hover">
        <span class="text-base leading-none">+</span> Add professor
      </button>
    }
  </div>

  <!-- Bulk-action panel: slim bar that appears only while rows are selected.
       Lets you set the SAME department/designation on every selected professor at
       once (leave a field blank to keep it unchanged), or bulk-delete them. -->
  @if (canManage() && selectedProfessors.length) {
    <div class="flex flex-wrap items-center gap-3 rounded-[14px] border border-primary/30 bg-primary/[0.07] px-4 py-2.5">
      <span class="text-sm font-medium text-text">
        {{ selectedProfessors.length }} professor{{ selectedProfessors.length > 1 ? 's' : '' }} selected
      </span>

      <div class="h-5 w-px bg-border"></div>

      <span class="text-sm text-muted">Set</span>

      <input
        type="text"
        placeholder="Department"
        [(ngModel)]="bulkDepartment"
        class="w-44 rounded-lg border border-border bg-surface px-3 py-1.5 text-sm text-text outline-none focus:border-primary focus:ring-2 focus:ring-primary/20">

      <select
        [(ngModel)]="bulkDesignation"
        class="rounded-lg border border-border bg-surface px-3 py-1.5 text-sm text-text outline-none focus:border-primary">
        <option value="">Designation (no change)</option>
        @for (d of designations; track d) {
          <option [value]="d">{{ d }}</option>
        }
      </select>

      <button
        mat-flat-button color="primary"
        [disabled]="applying"
        (click)="applyBulkEdit()">
        {{ applying ? 'Applying…' : 'Apply to ' + selectedProfessors.length }}
      </button>

      <div class="ml-auto flex items-center gap-3">
        <button
          (click)="bulkDeleteSelected()"
          class="rounded-lg bg-red-600 px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-red-700">
          Delete selected
        </button>
        <button
          (click)="clearBulkEdit()"
          class="rounded-lg px-3 py-1.5 text-sm font-medium text-muted hover:text-text">
          Cancel
        </button>
      </div>
    </div>
  }

  <!-- Grid (autoHeight: sizes to its rows, so the card grows with content) -->
  <div class="overflow-hidden rounded-[14px] border border-border bg-surface shadow-card">
    <app-ag-data-table
      [data]="professorStore.professors()"
      [columns]="columns"
      [loading]="professorStore.loading()"
      [showEdit]="false"
      [showDelete]="canManage()"
      [editable]="canManage()"
      [selectable]="canManage()"
      (deleteClicked)="deleteProfessor($event)"
      (cellEdited)="onCellEdited($event)"
      (selectionChanged)="onSelectionChanged($event)">
    </app-ag-data-table>
  </div>

</div>
