<header class="flex h-16 items-center justify-between border-b border-[#E5E7EB] bg-white px-6">
  <h1 class="text-base font-semibold text-[#171923]">Overview</h1>

  <div class="flex items-center gap-3">
    @if (avatarUrl()) {
      <img [src]="avatarUrl()" alt="Profile photo"
           class="h-8 w-8 rounded-full object-cover ring-1 ring-[#E5E7EB]">
    } @else {
      <div class="flex h-8 w-8 items-center justify-center rounded-full bg-[#5B5FEF] text-sm font-medium text-white">
        {{ initial() }}
      </div>
    }
  </div>
</header>
