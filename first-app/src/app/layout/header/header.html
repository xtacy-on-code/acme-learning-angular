<header class="flex h-16 shrink-0 items-center justify-between border-b border-border bg-surface px-6">
  <h1 class="text-lg font-semibold text-text">{{ pageTitle() }}</h1>

  <div class="flex items-center gap-2">
    <!-- Notifications -->
    <button type="button" aria-label="Notifications"
            class="relative flex h-9 w-9 items-center justify-center rounded-lg text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="absolute right-2 top-2 h-1.5 w-1.5 rounded-full bg-primary"></span>
    </button>

    <!-- User -->
    <div class="ml-1 flex items-center gap-2.5 border-l border-border pl-3">
      @if (avatarUrl()) {
        <img [src]="avatarUrl()" alt="Profile photo"
             class="h-8 w-8 rounded-full object-cover ring-1 ring-border">
      } @else {
        <div class="flex h-8 w-8 items-center justify-center rounded-full bg-primary text-sm font-semibold text-on-primary">
          {{ initial() }}
        </div>
      }
      @if (userName()) {
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-medium text-text">{{ userName() }}</span>
          @if (role()) {
            <span class="text-xs font-semibold capitalize text-primary">{{ role() }}</span>
          }
        </div>
      }
    </div>
  </div>
</header>
