<aside class="flex h-full w-64 flex-col border-r border-border bg-surface">
  <!-- Brand -->
  <div class="flex items-center gap-2.5 px-5 py-5">
    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-primary text-sm font-bold text-on-primary">
      A
    </div>
    <span class="text-base font-bold tracking-tight text-text">Acme</span>
  </div>

  <!-- Nav -->
  <nav class="flex flex-1 flex-col gap-1 px-3 pt-2">
    <p class="px-3 pb-1 text-xs font-semibold uppercase tracking-widest text-muted">Menu</p>

    <a routerLink="/home"
       routerLinkActive="bg-primary/10 text-primary border-primary"
       class="flex items-center gap-3 rounded-lg border-l-2 border-transparent px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5Z"/>
      </svg>
      Home
    </a>

    <a routerLink="/students"
       routerLinkActive="bg-primary/10 text-primary border-primary"
       class="flex items-center gap-3 rounded-lg border-l-2 border-transparent px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9" rx="1"/>
        <rect x="14" y="3" width="7" height="5" rx="1"/>
        <rect x="14" y="12" width="7" height="9" rx="1"/>
        <rect x="3" y="16" width="7" height="5" rx="1"/>
      </svg>
      Students
    </a>

    <a routerLink="/professors"
       routerLinkActive="bg-primary/10 text-primary border-primary"
       class="flex items-center gap-3 rounded-lg border-l-2 border-transparent px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"/>
      </svg>
      Professors
    </a>

    <a routerLink="/gallery"
       routerLinkActive="bg-primary/10 text-primary border-primary"
       class="flex items-center gap-3 rounded-lg border-l-2 border-transparent px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
      Gallery
    </a>

    <a routerLink="/profile"
       routerLinkActive="bg-primary/10 text-primary border-primary"
       class="flex items-center gap-3 rounded-lg border-l-2 border-transparent px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
  </nav>

  <!-- Bottom: theme + logout, separated by a divider -->
  <div class="mt-auto flex flex-col gap-3 border-t border-border px-3 py-4">
    <div class="flex flex-col gap-2 px-3">
      <span class="text-xs font-semibold uppercase tracking-widest text-muted">Theme</span>
      <app-theme-picker />
    </div>

    <button (click)="logout()"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-muted transition-colors hover:bg-surface-hover hover:text-text">
      <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <path d="M16 17l5-5-5-5"/>
        <path d="M21 12H9"/>
      </svg>
      Log out
    </button>
  </div>
</aside>
