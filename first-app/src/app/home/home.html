<div class="flex flex-col gap-6">

  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-semibold text-[#171923]">Welcome back</h1>
      <p class="mt-1 text-sm text-[#6B7280]">Here's a quick overview of your students.</p>
    </div>
    <a routerLink="/students">
      <button mat-raised-button color="primary">
        Go to Students
      </button>
    </a>
  </div>

  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">

    <div class="rounded-xl border border-[#E5E7EB] bg-white p-5">
      <p class="text-xs font-semibold uppercase tracking-wide text-[#6B7280]">Total Students</p>
      <p class="mt-2 text-2xl font-semibold text-[#171923]">{{ totalStudents() }}</p>
    </div>

    <div class="rounded-xl border border-[#E5E7EB] bg-white p-5">
      <p class="text-xs font-semibold uppercase tracking-wide text-[#6B7280]">Male</p>
      <p class="mt-2 text-2xl font-semibold text-[#171923]">{{ maleCount() }}</p>
    </div>

    <div class="rounded-xl border border-[#E5E7EB] bg-white p-5">
      <p class="text-xs font-semibold uppercase tracking-wide text-[#6B7280]">Female</p>
      <p class="mt-2 text-2xl font-semibold text-[#171923]">{{ femaleCount() }}</p>
    </div>

    <div class="rounded-xl border border-[#E5E7EB] bg-white p-5">
      <p class="text-xs font-semibold uppercase tracking-wide text-[#6B7280]">Other</p>
      <p class="mt-2 text-2xl font-semibold text-[#171923]">{{ otherCount() }}</p>
    </div>

  </div>

</div>
