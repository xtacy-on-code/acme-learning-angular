<table mat-table [dataSource]="data" class="w-full">

    @for (column of columns; track column.key) {
    <ng-container [matColumnDef]="column.key">
        <th mat-header-cell *matHeaderCellDef class="!text-xs !font-semibold !uppercase !tracking-wide !text-[#6B7280]">{{ column.label }}</th>
        <td mat-cell *matCellDef="let item" class="!text-sm !text-[#171923]">{{ item[column.key] }}</td>
    </ng-container>
    }

      
    @if (showDelete || showEdit) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="!text-xs !font-semibold !uppercase !tracking-wide !text-[#6B7280]">Actions</th>
        <td mat-cell *matCellDef="let item" class="!py-2">
          <div class="flex gap-2">
            @if (showEdit) {
                <button mat-icon-button color="primary" (click)="onEdit(item)" aria-label="Edit">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/>
              </svg>
            </button>
            }
            @if (showDelete) {
                <button mat-icon-button color="warn" (click)="onDelete(item)" aria-label="Delete">
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18"/>
                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              </svg>
            </button>
            }
            
          </div>
        </td>
      </ng-container>
    }  
      <tr mat-header-row *matHeaderRowDef="displayedColumns" class="!bg-[#F7F8FA]"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:!bg-[#F7F8FA]"></tr>
</table>
